<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digit Detection</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <div class="app" column>
        <button class="resetButton" id="resetButton">Reset Canvas</button>
        <canvas id="drawingCanvas"></canvas>
        <div class="response">
          <button class="submitButton" id="submitButton" type="button">
            What is this number?
          </button>
          <div class="answer">
            <p>Its Probably a :</p>
            <p id="resultText"></p>
          </div>
        </div>
      </div>
    </div>
    <script
      type="module"
      src="{{ url_for('static', filename='main.js') }}"
    ></script>
  </body>
</html>
